- name: Validaciones y configuracion en Linux
  hosts: os_linux
  become: yes

  vars:
    usuario: ecuador

    servicios_criticos_debian:
      - ssh.service
      - cron.service
      - nginx.service

    servicios_criticos_redhat:
      - sshd.service
      - crond.service
      - nginx.service

  tasks:

    - name: Verificar uso de disco
      command: df -h
      register: disk_usage
      changed_when: false

    - name: Obtener informacion de servicios
      service_facts:

    - name: Definir lista de servicios segun SO
      set_fact:
        servicios_criticos: >-
          {{
            servicios_criticos_debian
            if ansible_os_family == 'Debian'
            else servicios_criticos_redhat
          }}

    - name: Construir reporte de servicios
      set_fact:
        reporte_servicios: >-
          {{
            (reporte_servicios | default([])) + [
              {
                'servicio': item,
                'estado': (
                  ansible_facts.services[item].state
                  if item in ansible_facts.services
                  else 'no encontrado'
                ),
                'status': (
                  ansible_facts.services[item].status
                  if item in ansible_facts.services and 'status' in ansible_facts.services[item]
                  else 'desconocido'
                )
              }
            ]
          }}
      loop: "{{ servicios_criticos }}"

    - name: Crear usuario
      user:
        name: "{{ usuario }}"
        state: present
        shell: /bin/bash

    - name: Actualizar sistema (Debian/Ubuntu)
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Actualizar sistema (RedHat/CentOS)
      yum:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Construir reporte final
      set_fact:
        reporte_final: |
          ==================================================
                    REPORTE DE VALIDACION LINUX
          ==================================================
          Hostname         : {{ inventory_hostname }}
          Sistema Operativo: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Familia OS       : {{ ansible_os_family }}
          Usuario validado : {{ usuario }}

          -------------------- USO DE DISCO --------------------
          {% for line in disk_usage.stdout_lines %}
          {{ line }}
          {% endfor %}

          ---------------- ESTADO DE SERVICIOS ----------------
          {% for s in reporte_servicios %}
          - {{ "%-20s" | format(s.servicio) }} Estado: {{ "%-12s" | format(s.estado) }} | Habilitado: {{ s.status }}
          {% endfor %}

          ---------------- RESUMEN DE EJECUCION ---------------
          - Validacion de disco ejecutada correctamente
          - Validacion de servicios completada
          - Usuario '{{ usuario }}' verificado/creado correctamente
          - Actualizacion del sistema ejecutada segun la familia del SO

          ==================================================

    - name: Mostrar reporte final
      debug:
        msg: "{{ reporte_final.split('\n') }}"

    - name: Guardar reporte en archivo
      copy:
        content: "{{ reporte_final }}"
        dest: "/tmp/reporte_{{ inventory_hostname }}.txt"
        mode: '0644'
